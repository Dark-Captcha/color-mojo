[workspace]
authors = ["Huỳnh Bảo Biên <baobien.dev@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "color-mojo"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
test = "mojo run -I . tests/run_tests.mojo"
benchmark = "mojo run -I . benchmarks/run_benchmarks.mojo"
example = "mojo run -I . examples/basic_usage.mojo"

[feature.dev.tasks]
format = "mblack color tests benchmarks examples"

[feature.dev.dependencies]
mblack = ">=26.5.0.dev2026070123,<27"

[environments]
dev = { features = ["dev"], solve-group = "default" }

[dependencies]
mojo-compiler = ">=1.0.0b3.dev2026070123,<2"
