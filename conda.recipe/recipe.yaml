context:
  version: "0.3.0"
  mojo_version: "=1.0.0b3.dev2026070506"

package:
  name: color-mojo
  version: ${{ version }}

source:
  - git: https://github.com/Dark-Captcha/color-mojo.git
    rev: 03bb15552a99ffdeb6b104b123fdecbca0323989

build:
  number: 0
  script:
    - mojo precompile color -o ${{ PREFIX }}/lib/mojo/color.mojoc

requirements:
  build:
    - mojo-compiler ${{ mojo_version }}
  host:
    - mojo-compiler ${{ mojo_version }}
  run:
    - ${{ pin_compatible('mojo-compiler') }}

tests:
  - script:
      - if: unix
        then:
          - mojo run test_package.mojo
    files:
      recipe:
        - test_package.mojo
    requirements:
      run:
        - mojo ${{ mojo_version }}

about:
  homepage: https://github.com/Dark-Captcha/color-mojo
  repository: https://github.com/Dark-Captcha/color-mojo
  license: Apache-2.0 WITH LLVM-exception
  license_file: LICENSE
  summary: Capability-aware terminal colors and styles for Mojo

extra:
  maintainers:
    - Dark-Captcha
